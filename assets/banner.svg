<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f0d0b"/>
      <stop offset="100%" stop-color="#1a1a18"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5488C4" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#5488C4" stop-opacity="0"/>
    </linearGradient>
    <filter id="node-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.025" stroke-width="1">
    <line x1="0" y1="56" x2="900" y2="56"/>
    <line x1="0" y1="112" x2="900" y2="112"/>
    <line x1="0" y1="168" x2="900" y2="168"/>
    <line x1="0" y1="224" x2="900" y2="224"/>
    <line x1="180" y1="0" x2="180" y2="280"/>
    <line x1="360" y1="0" x2="360" y2="280"/>
    <line x1="540" y1="0" x2="540" y2="280"/>
    <line x1="720" y1="0" x2="720" y2="280"/>
  </g>

  <!-- Glow halo behind logo area -->
  <ellipse cx="200" cy="140" rx="160" ry="100" fill="#5488C4" fill-opacity="0.06" filter="url(#soft-glow)"/>

  <!-- ── Logo mark ── -->
  <g transform="translate(106, 96) scale(3.4)">
    <rect x="5" y="6" width="2.5" height="16" rx="1.25" fill="#6A9BD4"/>
    <rect x="9.5" y="6" width="13.5" height="4" rx="1.2" fill="#5488C4"/>
    <rect x="9.5" y="12" width="11" height="4" rx="1.2" fill="#5488C4" fill-opacity="0.85"/>
    <rect x="9.5" y="18" width="8" height="4" rx="1.2" fill="#5488C4" fill-opacity="0.65"/>
  </g>

  <!-- Wordmark -->
  <text x="212" y="153" font-family="'Outfit', 'Inter', sans-serif" font-size="64" font-weight="700" letter-spacing="-1" fill="#e8e6e1">skema</text>

  <!-- Tagline -->
  <text x="212" y="181" font-family="'Inter', sans-serif" font-size="15" font-weight="400" fill="#8f8c85" letter-spacing="0.2">Paste code. See your schema. Instantly.</text>

  <!-- Divider -->
  <line x1="212" y1="196" x2="660" y2="196" stroke="#3a3a36" stroke-width="1"/>

  <!-- Feature pills -->
  <!-- TypeScript -->
  <rect x="212" y="210" width="94" height="24" rx="12" fill="#5488C4" fill-opacity="0.15" stroke="#5488C4" stroke-opacity="0.35" stroke-width="1"/>
  <text x="259" y="226" text-anchor="middle" font-family="'Inter', sans-serif" font-size="11" font-weight="500" fill="#7aabdb">TypeScript</text>

  <!-- SQL -->
  <rect x="314" y="210" width="50" height="24" rx="12" fill="#5488C4" fill-opacity="0.12" stroke="#5488C4" stroke-opacity="0.3" stroke-width="1"/>
  <text x="339" y="226" text-anchor="middle" font-family="'Inter', sans-serif" font-size="11" font-weight="500" fill="#7aabdb">SQL</text>

  <!-- Prisma -->
  <rect x="372" y="210" width="60" height="24" rx="12" fill="#5488C4" fill-opacity="0.12" stroke="#5488C4" stroke-opacity="0.3" stroke-width="1"/>
  <text x="402" y="226" text-anchor="middle" font-family="'Inter', sans-serif" font-size="11" font-weight="500" fill="#7aabdb">Prisma</text>

  <!-- GraphQL -->
  <rect x="440" y="210" width="70" height="24" rx="12" fill="#5488C4" fill-opacity="0.12" stroke="#5488C4" stroke-opacity="0.3" stroke-width="1"/>
  <text x="475" y="226" text-anchor="middle" font-family="'Inter', sans-serif" font-size="11" font-weight="500" fill="#7aabdb">GraphQL</text>

  <!-- JSON Schema -->
  <rect x="518" y="210" width="94" height="24" rx="12" fill="#5488C4" fill-opacity="0.12" stroke="#5488C4" stroke-opacity="0.3" stroke-width="1"/>
  <text x="565" y="226" text-anchor="middle" font-family="'Inter', sans-serif" font-size="11" font-weight="500" fill="#7aabdb">JSON Schema</text>

  <!-- ── Mini diagram preview (right side) ── -->
  <!-- Node A -->
  <rect x="668" y="60" width="140" height="76" rx="6" fill="#1e1e1b" stroke="#3a3a36" stroke-width="1" filter="url(#node-shadow)"/>
  <rect x="668" y="60" width="4" height="76" rx="2" fill="#5488C4"/>
  <text x="682" y="80" font-family="'Inter', sans-serif" font-size="11" font-weight="600" fill="#e8e6e1">User</text>
  <rect x="682" y="88" width="112" height="1" fill="#3a3a36"/>
  <text x="682" y="103" font-family="'Inter', sans-serif" font-size="10" fill="#8f8c85">id</text>
  <text x="760" y="103" font-family="'Inter', sans-serif" font-size="10" fill="#5488C4">string</text>
  <text x="682" y="120" font-family="'Inter', sans-serif" font-size="10" fill="#8f8c85">email</text>
  <text x="760" y="120" font-family="'Inter', sans-serif" font-size="10" fill="#5488C4">string</text>

  <!-- Node B -->
  <rect x="668" y="164" width="140" height="76" rx="6" fill="#1e1e1b" stroke="#3a3a36" stroke-width="1" filter="url(#node-shadow)"/>
  <rect x="668" y="164" width="4" height="76" rx="2" fill="#5488C4" fill-opacity="0.65"/>
  <text x="682" y="184" font-family="'Inter', sans-serif" font-size="11" font-weight="600" fill="#e8e6e1">Post</text>
  <rect x="682" y="192" width="112" height="1" fill="#3a3a36"/>
  <text x="682" y="207" font-family="'Inter', sans-serif" font-size="10" fill="#8f8c85">id</text>
  <text x="760" y="207" font-family="'Inter', sans-serif" font-size="10" fill="#5488C4">string</text>
  <text x="682" y="224" font-family="'Inter', sans-serif" font-size="10" fill="#8f8c85">author</text>
  <text x="748" y="224" font-family="'Inter', sans-serif" font-size="10" fill="#7aabdb">User</text>

  <!-- Edge connecting the two nodes -->
  <path d="M 668 136 C 648 136 648 202 668 202" stroke="#5488C4" stroke-opacity="0.5" stroke-width="1.5" fill="none" stroke-dasharray="4 3"/>
  <circle cx="668" cy="136" r="3" fill="#5488C4" fill-opacity="0.7"/>
  <circle cx="668" cy="202" r="3" fill="#5488C4" fill-opacity="0.7"/>
</svg>
