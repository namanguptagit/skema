<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <filter id="card-shadow" x="-30%" y="-25%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
  </defs>
  <!-- Card background -->
  <rect x="3" y="3" width="42" height="42" rx="9" fill="#100c09" filter="url(#card-shadow)"/>
  <!-- Edges -->
  <line x1="24" y1="10" x2="11" y2="34" stroke="#C47A3A" stroke-width="2.5" stroke-opacity="0.5" stroke-linecap="round"/>
  <line x1="24" y1="10" x2="37" y2="34" stroke="#C47A3A" stroke-width="2.5" stroke-opacity="0.5" stroke-linecap="round"/>
  <line x1="11" y1="34" x2="37" y2="34" stroke="#C47A3A" stroke-width="2.5" stroke-opacity="0.5" stroke-linecap="round"/>
  <!-- Nodes -->
  <circle cx="24" cy="10" r="5" fill="#C47A3A"/>
  <circle cx="11" cy="34" r="5" fill="#C47A3A"/>
  <circle cx="37" cy="34" r="5" fill="#C47A3A"/>
</svg>
