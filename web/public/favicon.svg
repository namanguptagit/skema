<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <filter id="card-shadow" x="-30%" y="-25%" width="160%" height="160%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
    <filter id="mark-shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#92400e" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Card — moderate radius, no border, shadow only -->
  <rect x="3" y="2" width="42" height="42" rx="9" fill="#100c09" filter="url(#card-shadow)"/>

  <!-- Geometric S mark — stroke-rendered spine, sharp and architectural -->
  <path
    d="M 31 13 C 31 9 14 9 14 20 C 14 28 34 28 34 35 C 34 40 17 40 17 37"
    stroke="#fbbf24"
    stroke-width="6.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    filter="url(#mark-shadow)"
  />
</svg>
